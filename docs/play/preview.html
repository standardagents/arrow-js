<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Preview rendered ArrowJS playground output in an isolated document."
    />
    <link rel="canonical" href="https://arrow-js.com/play/preview.html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ArrowJS" />
    <meta property="og:title" content="ArrowJS Playground Preview" />
    <meta
      property="og:description"
      content="Preview rendered ArrowJS playground output in an isolated document."
    />
    <meta property="og:url" content="https://arrow-js.com/play/preview.html" />
    <meta property="og:image" content="https://assets.arrow-js.com/og.webp?2" />
    <meta property="og:image:type" content="image/webp" />
    <meta
      property="og:image:alt"
      content="ArrowJS logo on a light grid background with the text: A tiny, blazing-fast, type-safe reactive framework with WASM sandboxing for safe AI-generated UIs."
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="628" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ArrowJS Playground Preview" />
    <meta
      name="twitter:description"
      content="Preview rendered ArrowJS playground output in an isolated document."
    />
    <meta name="twitter:image" content="https://assets.arrow-js.com/og.webp?2" />
    <meta
      name="twitter:image:alt"
      content="ArrowJS logo on a light grid background with the text: A tiny, blazing-fast, type-safe reactive framework with WASM sandboxing for safe AI-generated UIs."
    />
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #ffffff;
        color: #161616;
      }
      html[data-theme='dark'] {
        color-scheme: dark;
      }
      html[data-theme='dark'] body {
        background: #171717;
        color: #f2f2f2;
      }
      #app {
        min-height: 100vh;
      }
      #runtime-error {
        display: none;
        margin: 0;
        padding: 16px;
        border-bottom: 1px solid rgba(191, 68, 68, 0.3);
        background: rgba(191, 68, 68, 0.12);
        color: #8f2020;
        white-space: pre-wrap;
        font: 13px/1.5 ui-monospace, SFMono-Regular, monospace;
      }
      #runtime-error[data-active='true'] {
        display: block;
      }
    </style>
  </head>
  <body>
    <pre id="runtime-error" data-active="false"></pre>
    <div id="app"></div>
    <script type="module" src="/play/preview.js"></script>
  </body>
</html>
