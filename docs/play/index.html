<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Interactive ArrowJS playground for building and testing reactive components, templates, and sandboxed UI flows."
    />
    <link rel="canonical" href="https://arrow-js.com/play/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ArrowJS" />
    <meta property="og:title" content="ArrowJS Playground" />
    <meta
      property="og:description"
      content="Interactive ArrowJS playground for building and testing reactive components, templates, and sandboxed UI flows."
    />
    <meta property="og:url" content="https://arrow-js.com/play/" />
    <meta property="og:image" content="https://assets.arrow-js.com/og.webp?2" />
    <meta property="og:image:type" content="image/webp" />
    <meta
      property="og:image:alt"
      content="ArrowJS logo on a light grid background with the text: A tiny, blazing-fast, type-safe reactive framework with WASM sandboxing for safe AI-generated UIs."
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="628" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ArrowJS Playground" />
    <meta
      name="twitter:description"
      content="Interactive ArrowJS playground for building and testing reactive components, templates, and sandboxed UI flows."
    />
    <meta name="twitter:image" content="https://assets.arrow-js.com/og.webp?2" />
    <meta
      name="twitter:image:alt"
      content="ArrowJS logo on a light grid background with the text: A tiny, blazing-fast, type-safe reactive framework with WASM sandboxing for safe AI-generated UIs."
    />
    <link rel="stylesheet" type="text/css" href="/play/play.css" />
    <style>
      .theme-toggle-icon { width: 18px; height: 18px; }
      .theme-toggle-sun { display: none; }
      .theme-toggle-moon { display: block; }
      [data-theme="dark"] .theme-toggle-sun { display: block; }
      [data-theme="dark"] .theme-toggle-moon { display: none; }
      .play-theme-toggle { color: var(--play-text-muted); padding: 4px 6px; }
    </style>
    <title>ArrowJS Playground</title>
    <script>
      try {
        var t = localStorage.getItem('arrow-theme')
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme:dark)').matches))
          document.documentElement.setAttribute('data-theme', 'dark')
      } catch (e) {}
    </script>
  </head>
  <body class="play-page">
    <div id="app"></div>
    <script type="module" src="/play/index.js"></script>
  </body>
</html>
